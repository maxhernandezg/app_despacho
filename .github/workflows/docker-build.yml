name: CI/CD - app-despacho

# Evento(s) que disparan este workflow
on:
  # Ejecutar cuando se hace push a ramas especificadas
  push:
    branches:
      - main
  # Permite disparar el workflow manualmente desde la UI de GitHub
  workflow_dispatch:

# Variables de entorno disponibles en todo el workflow
env:
  # Nombre de la imagen en Docker Hub (usuario/repo)
  IMAGE_NAME: maxhernandezg/app-despacho
  # Nombre del contenedor que se usará al ejecutar la imagen
  CONTAINER_NAME: app-despacho
  # Puerto expuesto en el host (mapeado a 80 dentro del contenedor)
  APP_PORT: 80
  # Región AWS usada para el job de despliegue via SSM
  AWS_REGION: us-east-1

jobs:
  # Job que construye la imagen y la sube a Docker Hub
  build_and_push:
    # Etiqueta legible para el job
    name: Construir imagen (target prod) y subir a Docker Hub
    # Runner que ejecuta las acciones (maquina ubuntu en GHA)
    runs-on: ubuntu-latest

    # Salidas del job: definimos un sha corto para taguear la imagen
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      # Paso: clonar el repositorio (checkout del código)
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # Paso: generar un tag corto a partir de la variable GITHUB_SHA
      - name: Definir tag SHA corto
        id: vars
        # Se toma el commit SHA y se cortan los primeros 7 caracteres
        run: echo "sha_short=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # Paso: configurar Buildx para builds avanzados de Docker
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso: iniciar sesión en Docker Hub usando secretos del repo
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          # Usuario y token se deben guardar en los Secrets del repo
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso: construir la imagen y publicarla en Docker Hub
      - name: Construir y publicar imagen (stage prod con nginx)
        uses: docker/build-push-action@v6
        with:
          # Contexto de build (directorio donde está el Dockerfile)
          context: .
          # Ruta al Dockerfile que contiene el target 'prod'
          file: ./Dockerfile
          # Target de multi-stage build a usar (etiqueta 'prod')
          target: prod
          # Indica que queremos pushear la imagen al registry
          push: true
          # Tags que se crearán: latest y con el sha corto
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          # Configuración de cache para acelerar builds en GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job que despliega la imagen en una instancia EC2 usando SSM
  deploy_ec2:
    name: Desplegar en EC2 vía SSM
    # Este job depende del anterior (espera que build_and_push termine)
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # Paso: configurar las credenciales AWS (usadas por la CLI aws)
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Las credenciales deben estar guardadas en Secrets
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          # Región a usar (definida en env del workflow)
          aws-region: ${{ env.AWS_REGION }}

      # Paso: enviar comando SSM a la instancia para actualizar el contenedor
      - name: Ejecutar pull y restart del container en EC2
        run: |
          # Enviamos un comando SSM que ejecuta varios comandos shell en la EC2
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ env.IMAGE_NAME }}:${{ needs.build_and_push.outputs.sha_short }}" \
            --parameters commands='[
              "docker pull ${{ env.IMAGE_NAME }}:latest",
              "docker stop ${{ env.CONTAINER_NAME }} || true",
              "docker rm ${{ env.CONTAINER_NAME }} || true",
              "docker run -d --name ${{ env.CONTAINER_NAME }} --restart unless-stopped -p ${{ env.APP_PORT }}:80 ${{ env.IMAGE_NAME }}:latest",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" --output text)
          # Mostramos el id del comando SSM
          echo "SSM Command ID: $CMD_ID"
          echo "Esperando finalización del despliegue..."
          # Esperamos hasta que el comando termine en la instancia
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"
          echo "Despliegue completado correctamente."
